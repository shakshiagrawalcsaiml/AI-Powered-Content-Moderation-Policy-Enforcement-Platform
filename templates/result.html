<!DOCTYPE html>
<html>
<head>
<title>Moderation Result</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    text-align:center;
}

.container{
    width:500px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:20px;
}

.result{
    text-align:left;
    font-size:16px;
    line-height:1.8;
}

.toxic{
    color:white;
    background:red;
    padding:4px 8px;
    border-radius:5px;
}

.safe{
    color:white;
    background:green;
    padding:4px 8px;
    border-radius:5px;
}

.button{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#3498db;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.button:hover{
    background:#2980b9;
}

.dashboard{
    background:#2c3e50;
}

</style>
</head>

<body>

<div class="container">

<h2>Moderation Result</h2>

<div class="result">

<p><b>Content:</b> {{ content }}</p>

<p><b>Label:</b> 
{% if label == "toxic" %}
<span class="toxic">Toxic</span>
{% else %}
<span class="safe">Safe</span>
{% endif %}
</p>

<p><b>Confidence:</b> {{ "%.2f"|format(score) }}</p>

<p><b>Severity Score:</b> {{ severity }}</p>

<p><b>Final Action:</b> {{ action }}</p>

</div>

<a class="button" href="/">Submit Another Content</a>
<br><br>
<a class="button dashboard" href="/dashboard">Moderator Dashboard</a>

</div>

</body>
</html>
