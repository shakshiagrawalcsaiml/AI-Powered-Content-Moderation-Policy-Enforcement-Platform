<!DOCTYPE html>
<html>
<head>
<title>Moderation Result</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
}

/* HEADER */
.header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

/* CONTAINER */
.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

.result{
    text-align:left;
    font-size:16px;
    line-height:1.8;
}

/* CONTENT BOX */
.content-box{
    background:#f9f9f9;
    padding:10px;
    border-radius:5px;
    margin-bottom:10px;
}

/* LABEL */
.toxic{
    color:white;
    background:red;
    padding:5px 10px;
    border-radius:5px;
}

.safe{
    color:white;
    background:green;
    padding:5px 10px;
    border-radius:5px;
}

/* ACTION BADGE */
.badge{
    padding:5px 10px;
    border-radius:5px;
    color:white;
    font-weight:bold;
}

.auto{ background:red; }
.review{ background:orange; }
.allow{ background:green; }

/* BUTTONS */
.button{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#3498db;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.button:hover{
    background:#2980b9;
}

.dashboard{
    background:#2c3e50;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Moderation Result</h2>
</div>

<div class="container">

<div class="result">

<p><b>Content:</b></p>
<div class="content-box">
    {{ content }}
</div>

<p><b>Label:</b> 
{% if label == "toxic" %}
<span class="toxic">Toxic</span>
{% else %}
<span class="safe">Safe</span>
{% endif %}
</p>

<p><b>Confidence:</b> {{ "%.2f"|format(score) }}</p>

<p><b>Severity Score:</b> {{ severity }}</p>

<p><b>Final Action:</b> 
<span class="badge
{% if action == 'AUTO_REMOVE' %} auto
{% elif action == 'SEND_TO_MODERATOR' %} review
{% else %} allow
{% endif %}
">
{{ action }}
</span>
</p>

</div>

<a class="button" href="/">Submit Another Content</a>
<br><br>
<a class="button dashboard" href="/dashboard">Go to Dashboard</a>

</div>

</body>
</html>
